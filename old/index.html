<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiFi Onboarding</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; max-width: 480px; margin: 0 auto; padding: 20px; background: #f0f4f8; min-height: 100vh; }
    h1 { font-size: 1.3rem; margin-bottom: 4px; color: #1a1a2e; }
    .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 20px; }
    .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    button {
      display: block; width: 100%; padding: 13px;
      margin: 8px 0; font-size: 1rem; font-weight: 500;
      border: none; border-radius: 8px;
      background: #1a73e8; color: white; cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1557b0; }
    button:disabled { background: #b0bec5; cursor: not-allowed; }
    button.secondary { background: #f1f3f4; color: #333; }
    button.secondary:hover { background: #e2e5e9; }
    input {
      width: 100%; padding: 11px 12px; font-size: 1rem;
      border: 1.5px solid #ddd; border-radius: 8px;
      margin-bottom: 10px; outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #1a73e8; }
    label { font-size: 0.85rem; color: #555; display: block; margin-bottom: 4px; }
    .red-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      border: 1.5px solid #eee; margin-bottom: 8px;
      transition: border-color 0.2s, background 0.2s;
    }
    .red-item:hover { border-color: #1a73e8; background: #f0f7ff; }
    .red-item.selected { border-color: #1a73e8; background: #e8f0fe; }
    .red-nombre { font-weight: 500; font-size: 0.95rem; }
    .red-meta { font-size: 0.75rem; color: #888; margin-top: 2px; }
    .red-signal { font-size: 1.1rem; letter-spacing: -1px; color: #1a73e8; }
    .status-badge {
      display: inline-block; padding: 4px 10px;
      border-radius: 20px; font-size: 0.8rem; font-weight: 500;
    }
    .status-conectado { background: #e8f5e9; color: #2e7d32; }
    .status-desconectado { background: #fce4ec; color: #c62828; }
    .status-buscando { background: #fff8e1; color: #f57f17; }
    #log {
      font-size: 0.78rem; color: #555;
      max-height: 140px; overflow-y: auto;
      line-height: 1.6;
    }
    .log-ok   { color: #2e7d32; }
    .log-err  { color: #c62828; }
    .log-rx   { color: #1557b0; font-weight: 500; }
    .log-info { color: #888; }
    .seccion { display: none; }
    .seccion.activa { display: block; }
    .wifi-icon { font-size: 2rem; text-align: center; margin-bottom: 8px; }
  </style>
</head>
<body>

  <h1>📶 WiFi Onboarding</h1>
  <p class="subtitle">Configura la conexión WiFi de tu dispositivo</p>

  <!-- SECCIÓN 1: Conectar BLE -->
  <div class="card seccion activa" id="secBLE">
    <div class="wifi-icon">🔵</div>
    <p style="text-align:center; margin-bottom:12px; color:#555; font-size:0.9rem;">
      Acércate al dispositivo y pulsa conectar
    </p>
    <button id="btnConectar">Conectar al dispositivo</button>
  </div>

  <!-- SECCIÓN 2: Escanear redes -->
  <div class="card seccion" id="secRedes">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <strong>Redes disponibles</strong>
      <button id="btnScan" class="secondary" style="width:auto; padding:6px 14px; font-size:0.85rem; margin:0;">
        🔄 Actualizar
      </button>
    </div>
    <div id="listaRedes">
      <p style="color:#888; font-size:0.9rem;">Pulsa "Actualizar" para buscar redes...</p>
    </div>
  </div>

  <!-- SECCIÓN 3: Contraseña -->
  <div class="card seccion" id="secPassword">
    <strong id="labelRedSeleccionada">Red seleccionada</strong>
    <p style="color:#888; font-size:0.82rem; margin: 6px 0 14px;">Introduce la contraseña de la red</p>
    <label>Contraseña</label>
    <input type="password" id="inputPassword" placeholder="Contraseña WiFi...">
    <div style="display:flex; gap:8px;">
      <button id="btnVolver" class="secondary" style="flex:1">← Volver</button>
      <button id="btnConectar2" style="flex:2">Conectar →</button>
    </div>
  </div>

  <!-- SECCIÓN 4: Resultado -->
  <div class="card seccion" id="secResultado">
    <div class="wifi-icon" id="iconoResultado">⏳</div>
    <p id="textoResultado" style="text-align:center; margin-bottom:16px; font-size:0.95rem;">Conectando...</p>
    <button id="btnOtraRed" class="secondary">Elegir otra red</button>
  </div>

  <!-- Log -->
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
      <strong style="font-size:0.85rem;">Registro</strong>
      <span id="estadoBLE" class="status-badge status-desconectado">Sin conexión BLE</span>
    </div>
    <div id="log">Esperando...</div>
  </div>

  <script>
    const SERVICE_UUID = '12345678-1234-5678-1234-56789abcdef0';
    const RX_CHAR_UUID = '12345678-1234-5678-1234-56789abcdef1';
    const TX_CHAR_UUID = '12345678-1234-5678-1234-56789abcdef2';
    const DEVICE_NAME  = 'TFM-Onboarding';

    let gattDevice = null;
    let rxCharacteristic = null;
    let redSeleccionada = null;
    let esperandoRespuesta = null;

    // ── Utilidades UI ────────────────────────────────────────────
    const log = (msg, cls = 'log-info') => {
      const div = document.getElementById('log');
      const line = document.createElement('div');
      line.className = cls;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      div.appendChild(line);
      div.scrollTop = div.scrollHeight;
    };

    const mostrarSeccion = (id) => {
      document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
      document.getElementById(id).classList.add('activa');
    };

    const setEstadoBLE = (texto, cls) => {
      const badge = document.getElementById('estadoBLE');
      badge.textContent = texto;
      badge.className = `status-badge ${cls}`;
    };

    const signalIcon = (signal) => {
      if (signal >= 75) return '▂▄▆█';
      if (signal >= 50) return '▂▄▆_';
      if (signal >= 25) return '▂▄__';
      return '▂___';
    };

    // ── BLE ──────────────────────────────────────────────────────
    async function obtenerCaracteristicas(server) {
      const service = await server.getPrimaryService(SERVICE_UUID);
      rxCharacteristic = await service.getCharacteristic(RX_CHAR_UUID);
      const txChar = await service.getCharacteristic(TX_CHAR_UUID);
      await txChar.startNotifications();
      txChar.addEventListener('characteristicvaluechanged', onNotificacion);
      log('BLE conectado ✓', 'log-ok');
    }

    function onNotificacion(event) {
      const valor = new TextDecoder().decode(event.target.value);
      log(`← ${valor}`, 'log-rx');
      if (esperandoRespuesta) {
        esperandoRespuesta(valor);
        esperandoRespuesta = null;
      }
    }

    function enviarComando(cmd) {
      return new Promise(async (resolve, reject) => {
        try {
          esperandoRespuesta = resolve;
          const encoded = new TextEncoder().encode(cmd);
          await rxCharacteristic.writeValueWithoutResponse(encoded);
          log(`→ ${cmd}`, 'log-info');
          setTimeout(() => {
            if (esperandoRespuesta) {
              esperandoRespuesta = null;
              reject(new Error('Timeout esperando respuesta'));
            }
          }, 30000);
        } catch (err) {
          esperandoRespuesta = null;
          reject(err);
        }
      });
    }

    function configurarReconexion() {
      gattDevice.addEventListener('gattserverdisconnected', async () => {
        setEstadoBLE('Reconectando...', 'status-buscando');
        log('Conexión perdida, reconectando...', 'log-info');
        try {
          const server = await gattDevice.gatt.connect();
          await obtenerCaracteristicas(server);
          setEstadoBLE('BLE conectado', 'status-conectado');
        } catch (err) {
          setEstadoBLE('Sin conexión BLE', 'status-desconectado');
          log(`Error reconectando: ${err.message}`, 'log-err');
        }
      });
    }

    // ── Botón Conectar BLE ───────────────────────────────────────
    document.getElementById('btnConectar').addEventListener('click', async () => {
      log('Iniciando conexión BLE...', 'log-info');
      try {
        if (!navigator.bluetooth) {
          log('Web Bluetooth no disponible', 'log-err');
          return;
        }
        setEstadoBLE('Buscando...', 'status-buscando');
        gattDevice = await navigator.bluetooth.requestDevice({
          filters: [{ name: DEVICE_NAME }],
          optionalServices: [SERVICE_UUID]
        });
        log(`Dispositivo encontrado: ${gattDevice.name}`, 'log-ok');
        const server = await gattDevice.gatt.connect();
        await obtenerCaracteristicas(server);
        configurarReconexion();
        setEstadoBLE('BLE conectado', 'status-conectado');
        mostrarSeccion('secRedes');
      } catch (err) {
        setEstadoBLE('Sin conexión BLE', 'status-desconectado');
        log(`Error: ${err.message}`, 'log-err');
      }
    });

    // ── Botón Escanear redes ─────────────────────────────────────
    document.getElementById('btnScan').addEventListener('click', async () => {
      const lista = document.getElementById('listaRedes');
      lista.innerHTML = '<p style="color:#888; font-size:0.9rem;">Escaneando...</p>';
      log('Escaneando redes WiFi...', 'log-info');
      try {
        const respuesta = await enviarComando('SCAN');
        if (!respuesta.startsWith('NETS:') || respuesta === 'NETS:') {
          lista.innerHTML = '<p style="color:#888;">No se encontraron redes</p>';
          return;
        }
        const redes = respuesta.slice(5).split('|').map(r => {
          const partes = r.split(',');
          return { ssid: partes[0], signal: parseInt(partes[1]), security: partes[2] };
        });
        lista.innerHTML = '';
        redes.forEach(red => {
          const item = document.createElement('div');
          item.className = 'red-item';
          item.innerHTML = `
            <div>
              <div class="red-nombre">${red.ssid}</div>
              <div class="red-meta">${red.security} · ${red.signal}%</div>
            </div>
            <div class="red-signal">${signalIcon(red.signal)}</div>
          `;
          item.addEventListener('click', () => seleccionarRed(red, item));
          lista.appendChild(item);
        });
        log(`${redes.length} redes encontradas`, 'log-ok');
      } catch (err) {
        lista.innerHTML = '<p style="color:#c62828;">Error al escanear</p>';
        log(`Error escaneo: ${err.message}`, 'log-err');
      }
    });

    // ── Seleccionar red ──────────────────────────────────────────
    function seleccionarRed(red, elemento) {
      document.querySelectorAll('.red-item').forEach(i => i.classList.remove('selected'));
      elemento.classList.add('selected');
      redSeleccionada = red;
      document.getElementById('labelRedSeleccionada').textContent = `🔒 ${red.ssid}`;
      document.getElementById('inputPassword').value = '';
      mostrarSeccion('secPassword');
    }

    // ── Botón Volver ─────────────────────────────────────────────
    document.getElementById('btnVolver').addEventListener('click', () => {
      mostrarSeccion('secRedes');
    });

    // ── Botón Conectar WiFi ──────────────────────────────────────
    document.getElementById('btnConectar2').addEventListener('click', async () => {
      const password = document.getElementById('inputPassword').value;
      if (!password) {
        log('Introduce una contraseña', 'log-err');
        return;
      }
      mostrarSeccion('secResultado');
      document.getElementById('iconoResultado').textContent = '⏳';
      document.getElementById('textoResultado').textContent =
        `Conectando a "${redSeleccionada.ssid}"...`;
      try {
        const respuesta = await enviarComando(`CONNECT:${redSeleccionada.ssid}|${password}`);
        if (respuesta.startsWith('WIFI_OK:')) {
          document.getElementById('iconoResultado').textContent = '✅';
          document.getElementById('textoResultado').textContent =
            `Conectado a "${redSeleccionada.ssid}" correctamente`;
          log(`WiFi conectado: ${respuesta}`, 'log-ok');
        } else {
          const motivo = respuesta.split(':')[1] || 'desconocido';
          const mensajes = {
            'red_no_encontrada':    'Red no encontrada',
            'contraseña_incorrecta':'Contraseña incorrecta',
            'timeout':              'Tiempo de espera agotado',
            'formato_invalido':     'Error interno',
          };
          document.getElementById('iconoResultado').textContent = '❌';
          document.getElementById('textoResultado').textContent =
            mensajes[motivo] || `Error: ${motivo}`;
          log(`Error WiFi: ${respuesta}`, 'log-err');
        }
      } catch (err) {
        document.getElementById('iconoResultado').textContent = '❌';
        document.getElementById('textoResultado').textContent = 'Error de comunicación';
        log(`Error: ${err.message}`, 'log-err');
      }
    });

    // ── Botón Elegir otra red ────────────────────────────────────
    document.getElementById('btnOtraRed').addEventListener('click', () => {
      mostrarSeccion('secRedes');
    });

  </script>
</body>
</html>
