<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLE Hola Mundo</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.4rem; }
    button {
      display: block; width: 100%; padding: 14px;
      margin: 10px 0; font-size: 1rem;
      border: none; border-radius: 8px;
      background: #1a73e8; color: white; cursor: pointer;
    }
    button:disabled { background: #aaa; cursor: not-allowed; }
    input {
      width: 100%; padding: 10px; font-size: 1rem;
      box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px;
      margin-bottom: 8px;
    }
    #log {
      margin-top: 20px; padding: 12px;
      background: #f4f4f4; border-radius: 8px;
      font-size: 0.85rem; white-space: pre-wrap;
      min-height: 80px;
    }
    .ok  { color: #1a7a1a; }
    .err { color: #c0392b; }
    .rx  { color: #1a73e8; }
  </style>
</head>
<body>
  <h1>🔵 BLE Hola Mundo</h1>

  <button id="btnConectar">Conectar a HolaMundo-BLE</button>

  <input type="text" id="inputMsg" placeholder="Mensaje para la RPi..." disabled>
  <button id="btnEnviar" disabled>Enviar a RPi →</button>

  <div id="log">Esperando conexión...</div>

  <script>
    
const SERVICE_UUID = '12345678-1234-5678-1234-56789abcdef0';
const RX_CHAR_UUID = '12345678-1234-5678-1234-56789abcdef1';
const TX_CHAR_UUID = '12345678-1234-5678-1234-56789abcdef2';
    // Variables globales
let gattDevice = null;
let rxCharacteristic = null;

async function obtenerCaracteristicas(server) {
  const service = await server.getPrimaryService(SERVICE_UUID);
  log('Servicio GATT obtenido ✓', 'ok');

  rxCharacteristic = await service.getCharacteristic(RX_CHAR_UUID);
  log('Característica RX lista ✓', 'ok');

  const txChar = await service.getCharacteristic(TX_CHAR_UUID);
  await txChar.startNotifications();
  txChar.addEventListener('characteristicvaluechanged', (event) => {
    const valor = new TextDecoder().decode(event.target.value);
    log(`← RPi dice: "${valor}"`, 'rx');
  });
  log('Suscrito a notificaciones TX ✓', 'ok');
}

document.getElementById('btnConectar').addEventListener('click', async () => {
  try {
    log('Buscando dispositivo BLE...');

    gattDevice = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'HolaMundo-BLE' }],
      optionalServices: [SERVICE_UUID]
    });

    log(`Dispositivo encontrado: ${gattDevice.name}`, 'ok');

    const server = await gattDevice.gatt.connect();
    log('Conectado al servidor GATT ✓', 'ok');

    await obtenerCaracteristicas(server);

    document.getElementById('inputMsg').disabled = false;
    document.getElementById('btnEnviar').disabled = false;
    document.getElementById('btnConectar').disabled = true;

    log('¡Listo! Escribe un mensaje y envíalo.', 'ok');

  } catch (err) {
    log(`Error: ${err.message}`, 'err');
  }
});

document.getElementById('btnEnviar').addEventListener('click', async () => {
  const msg = document.getElementById('inputMsg').value.trim();
  if (!msg || !gattDevice) return;

  try {
    // Si se desconectó, reconectar Y re-obtener características
    if (!gattDevice.gatt.connected) {
      log('Reconectando...', 'ok');
      const server = await gattDevice.gatt.connect();
      await obtenerCaracteristicas(server);
      log('Reconectado ✓', 'ok');
    }

    const encoded = new TextEncoder().encode(msg);
    await rxCharacteristic.writeValueWithoutResponse(encoded);
    log(`→ Enviado a RPi: "${msg}"`, 'ok');
    document.getElementById('inputMsg').value = '';

  } catch (err) {
    log(`Error al enviar: ${err.message}`, 'err');
  }
});
  </script>
</body>
</html>
