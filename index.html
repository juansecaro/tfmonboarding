<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiFi Onboarding</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <h1>📶 WiFi Onboarding</h1>
  <p class="subtitle">Configura la conexión WiFi de tu dispositivo</p>

  <!-- SECCIÓN 1: Conectar BLE -->
  <div class="card seccion activa" id="secBLE">
    <div class="wifi-icon">🔵</div>
    <p style="text-align:center; margin-bottom:12px; color:#555; font-size:0.9rem;">
      Acércate al dispositivo y pulsa conectar
    </p>
    <button id="btnConectar">Conectar al dispositivo</button>
  </div>

  <!-- SECCIÓN 2: Escanear redes -->
  <div class="card seccion" id="secRedes">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <strong>Redes disponibles</strong>
      <button id="btnScan" class="secondary"
        style="width:auto; padding:6px 14px; font-size:0.85rem; margin:0;">
        🔄 Actualizar
      </button>
    </div>
    <div id="listaRedes">
      <p style="color:#888; font-size:0.9rem;">Pulsa "Actualizar" para buscar redes...</p>
    </div>
    <div class="countdown" id="countdownScan"></div>
    <button id="btnDesconectar" class="secondary" style="margin-top:8px; font-size:0.85rem;">
      Desconectar BLE
    </button>
  </div>

  <!-- SECCIÓN 3: Contraseña -->
  <div class="card seccion" id="secPassword">
    <strong id="labelRedSeleccionada">Red seleccionada</strong>
    <p style="color:#888; font-size:0.82rem; margin: 6px 0 14px;">
      Introduce la contraseña de la red
    </p>
    <label>Contraseña</label>
    <div class="input-wrapper">
      <input type="password" id="inputPassword" placeholder="Contraseña WiFi...">
      <button class="toggle-password" id="togglePassword" type="button">👁</button>
    </div>
    <div class="btn-row">
      <button id="btnVolver" class="secondary">← Volver</button>
      <button id="btnConectar2">Conectar →</button>
    </div>
  </div>

  <!-- SECCIÓN 4: Resultado -->
  <div class="card seccion" id="secResultado">
    <div class="wifi-icon" id="iconoResultado">⏳</div>
    <p id="textoResultado"
      style="text-align:center; margin-bottom:8px; font-size:0.95rem;">
      Conectando...
    </p>
    <div class="countdown" id="countdownConectar"></div>
    <button id="btnOtraRed" class="secondary" style="margin-top:12px;">
      Elegir otra red
    </button>
  </div>

  <!-- Log -->
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
      <strong style="font-size:0.85rem;">Registro</strong>
      <span id="estadoBLE" class="status-badge status-desconectado">Sin conexión BLE</span>
    </div>
    <div id="log">Esperando...</div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
